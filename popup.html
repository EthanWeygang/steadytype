<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header .version {
      font-size: 10px;
      color: #64748b;
      margin-left: auto;
    }

    /* ── Toggle ─────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .toggle-row .label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-row .status {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #94a3b8;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }

    .switch input:checked + .slider {
      background: #22c55e;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
      background: #fff;
    }

    /* ── Stats ──────────────────────────────────────────────── */
    .stats {
      background: #1e293b;
      border-radius: 10px;
      padding: 14px;
    }

    .stats .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .stats .stat-row + .stat-row {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #334155;
    }

    .stats .stat-label {
      color: #94a3b8;
    }

    .stats .stat-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #f1f5f9;
    }

    .reset-btn {
      margin-top: 12px;
      width: 100%;
      padding: 7px;
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .reset-btn:hover {
      background: #1e293b;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SteadyType</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div class="toggle-row">
    <div>
      <div class="label">Enabled</div>
      <div class="status" id="statusText">Active</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">Requests sent</span>
      <span class="stat-value" id="requestCount">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Corrections applied</span>
      <span class="stat-value" id="correctionCount">0</span>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">Reset counters</button>

  <script src="popup.js"></script>
</body>
</html>
